name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Detect Project Root & Auto-Fix Broken XML
        run: |
          if [ -d "A-TV-Player/app" ]; then
            BASE_DIR="A-TV-Player"
          else
            BASE_DIR="."
          fi
          echo "PROJECT_BASE=$BASE_DIR" >> $GITHUB_ENV
          
          echo "Fixing potentially truncated btn_primary_bg.xml..."
          cat << 'XML' > "$BASE_DIR/app/src/main/res/drawable/btn_primary_bg.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_focused="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#1976D2" />
                      <corners android:radius="10dp" />
                      <stroke android:width="3dp" android:color="#FFFFFF" />
                  </shape>
              </item>
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#0D47A1" />
                      <corners android:radius="10dp" />
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#1565C0" />
                      <corners android:radius="10dp" />
                  </shape>
              </item>
          </selector>
          XML
          echo "File repaired successfully!"

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > "$PROJECT_BASE/app/google-services.json"
            echo "Firebase config written successfully."
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set. Using placeholder."
          fi

      - name: Build Debug APK
        run: |
          cd $PROJECT_BASE
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A-TV-Player-debug-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
