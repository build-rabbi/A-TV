name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Write google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          TARGET_DIR="app"
          if [ -d "A-TV-Player/app" ]; then
            TARGET_DIR="A-TV-Player/app"
          fi
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > "$TARGET_DIR/google-services.json"
            echo "Firebase config written to $TARGET_DIR/google-services.json"
          else
            echo "No secret found, using existing or placeholder google-services.json"
          fi

      - name: Build Debug APK
        run: |
          if [ -f "settings.gradle" ]; then
            gradle assembleDebug --no-daemon
          elif [ -f "A-TV-Player/settings.gradle" ]; then
            cd A-TV-Player
            gradle assembleDebug --no-daemon
          else
            echo "ERROR: settings.gradle not found in root or A-TV-Player folder!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A-TV-Player-debug-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
