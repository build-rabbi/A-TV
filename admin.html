<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>A-TV Admin Portal</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script></head>
<body class="bg-gray-900 text-white p-4 md:p-8"><div class="max-w-5xl mx-auto">
<header class="flex flex-col md:flex-row justify-between border-b border-gray-800 pb-6 mb-8 gap-4"><div><h1 class="text-3xl font-bold text-blue-500">A-TV IPTV</h1><p class="text-gray-400 text-sm">Admin Portal</p></div><div class="bg-gray-800 p-3 rounded border border-gray-700"><label class="block text-xs text-gray-400 font-bold uppercase mb-1">WhatsApp Support Number</label><div class="flex gap-2"><input type="text" id="globalWhatsApp" class="bg-gray-900 text-sm px-2 py-1 rounded border border-gray-600" placeholder="+88017XXXXXXXX"><button onclick="saveWhatsApp()" class="bg-blue-600 text-xs px-3 py-1 rounded font-bold">Save</button></div></div></header>
<section class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8"><h2 class="text-xl font-bold mb-4">✚ Add New User Key</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label class="block text-xs font-bold text-gray-400 mb-1">Key Code</label><input type="text" id="newKey" class="w-full bg-gray-900 border border-gray-700 rounded p-2" placeholder="PREMIUM_123"></div><div><label class="block text-xs font-bold text-gray-400 mb-1">Expiry Date</label><input type="date" id="newExpiry" class="w-full bg-gray-900 border border-gray-700 rounded p-2"></div><div class="flex items-end"><button onclick="addKey()" class="w-full bg-blue-600 font-bold py-2 rounded">Create Access Key</button></div></div></section>
<section class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden"><div class="p-6 border-b border-gray-700 flex justify-between"><h2 class="text-xl font-bold">👥 Active Users</h2><span id="keyCount" class="bg-blue-900 text-blue-400 text-xs font-bold px-3 py-1 rounded-full">0 Keys</span></div><div class="overflow-x-auto"><table class="w-full text-left"><thead><tr class="bg-gray-900 text-gray-400 text-xs border-b border-gray-700"><th class="p-4">Key Code</th><th class="p-4">Status</th><th class="p-4">Expiry Date</th><th class="p-4 text-right">Actions</th></tr></thead><tbody id="keysTableBody" class="divide-y divide-gray-700"></tbody></table></div></section>
</div><script>
const config = { apiKey: "AIzaSyD-placeholder-replace-with-real-key", authDomain: "your-project-id.firebaseapp.com", databaseURL: "https://your-project-id-default-rtdb.firebaseio.com", projectId: "your-project-id", storageBucket: "your-project-id.appspot.com", appId: "1:123456789012:android:abcdef1234567890abcd" };
firebase.initializeApp(config); const db = firebase.database();
db.ref('settings/whatsapp').on('value', s => { if(s.exists()) document.getElementById('globalWhatsApp').value = s.val(); });
function saveWhatsApp() { db.ref('settings/whatsapp').set(document.getElementById('globalWhatsApp').value.trim()).then(() => Swal.fire('Saved!', '', 'success')); }
db.ref('keys').on('value', s => { const b = document.getElementById('keysTableBody'); b.innerHTML = ''; if(!s.exists()) return; let c=0; Object.keys(s.val()).forEach(k => { c++; const u=s.val()[k], p=u.status==='paused', badge=p?'<span class="bg-amber-900 text-amber-400 text-xs px-2 py-0.5 rounded-full">Paused</span>':'<span class="bg-green-900 text-green-400 text-xs px-2 py-0.5 rounded-full">Active</span>';
b.insertAdjacentHTML('beforeend', `<tr><td class="p-4 font-mono">${k}</td><td class="p-4">${badge}</td><td class="p-4"><input type="date" value="${u.expiry!=='No Limit'?u.expiry:''}" onchange="updateExp('${k}',this.value)" class="bg-gray-900 p-1 rounded border border-gray-700 text-xs"></td><td class="p-4 text-right flex justify-end gap-2"><button onclick="toggle('${k}','${u.status}')" class="bg-gray-700 text-xs py-1 px-2 rounded">${p?'Activate':'Pause'}</button><button onclick="del('${k}')" class="bg-red-900 text-xs py-1 px-2 rounded">Delete</button></td></tr>`); }); document.getElementById('keyCount').innerText = c+' Total Keys'; });
function addKey() { const k=document.getElementById('newKey').value.trim(), e=document.getElementById('newExpiry').value; if(!k) return; db.ref('keys/'+k).set({status:'active', expiry:e||'No Limit'}).then(() => { document.getElementById('newKey').value=''; Swal.fire('Success','','success'); }); }
function toggle(k,s) { db.ref('keys/'+k+'/status').set(s==='active'?'paused':'active'); }
function updateExp(k,d) { db.ref('keys/'+k+'/expiry').set(d||'No Limit'); }
function del(k) { db.ref('keys/'+k).remove(); }
</script></body></html>
